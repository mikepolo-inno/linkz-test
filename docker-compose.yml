services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: linkz-seats:latest
    container_name: linkz-seats
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      # Fixed path — do NOT interpolate from the repo-root .env (local dev uses
      # file:./dev.db, which would break the containerised SQLite volume).
      DATABASE_URL: "file:/app/data/app.db"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace-with-clerk-publishable-key}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-sk_test_replace-with-clerk-secret-key}"
      NODE_ENV: production
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Set to 0 to keep DB state across container restarts without re-seeding.
      SEED_ON_START: "${SEED_ON_START:-1}"
    volumes:
      - linkz-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  linkz-data:
    name: linkz-seats-data
